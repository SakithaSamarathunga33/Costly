name: expense_tracker
description: Expense Tracker App Generated UI

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.1
  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  # Date formatting
  intl: ^0.19.0
  # Charts for analytics
  fl_chart: ^0.68.0
  # Local storage for session persistence
  shared_preferences: ^2.2.2
  google_sign_in: ^7.2.0
  # Image picker for profile pictures
  image_picker: ^1.0.7
  # HTTP for Cloudinary upload
  http: ^1.2.1
  # For generating signatures
  crypto: ^3.0.3
  # For multipart content type
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo2.png"
  adaptive_icon_background: "#5D3891"
  adaptive_icon_foreground: "assets/images/logo2.png"
  web:
    generate: true
    image_path: "assets/images/logo2.png"
    background_color: "#5D3891"
    theme_color: "#5D3891"
