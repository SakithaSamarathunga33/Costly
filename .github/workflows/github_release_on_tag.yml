# Sole Android CI build: runs only when you push a version tag (not on every main commit).
# Builds a release APK and publishes a GitHub Release with that APK attached.
#
# Usage:
#   git tag v1.3.0
#   git push origin v1.3.0
#
# Tag format: vMAJOR.MINOR.PATCH (e.g. v1.0.0, v1.2.3)

name: GitHub Release (tag)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: github-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SEMVER="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "Release tag=$TAG semver=$SEMVER"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set version in pubspec
        run: |
          sed -i "s/^version: .*/version: ${{ steps.tag.outputs.semver }}+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Print debug keystore SHA-1 (Firebase Google Sign-In)
        run: |
          echo "If Google login fails only on CI-built APKs, add this SHA-1 in Firebase Console → Project settings → Your Android app."
          if [ -f "$HOME/.android/debug.keystore" ]; then
            keytool -list -v -keystore "$HOME/.android/debug.keystore" -alias androiddebugkey -storepass android -keypass android | grep -E "SHA1:|SHA256:" || true
          else
            echo "No ~/.android/debug.keystore (unexpected after build)."
          fi

      - name: Prepare APK for release
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "Costly-${{ steps.tag.outputs.semver }}.apk"
          ls -la "Costly-${{ steps.tag.outputs.semver }}.apk"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Costly ${{ steps.tag.outputs.semver }}
          generate_release_notes: true
          files: Costly-${{ steps.tag.outputs.semver }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
