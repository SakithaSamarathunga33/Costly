# Sole Android CI build: runs only when you push a version tag (not on every main commit).
# Builds a release APK and publishes a GitHub Release with that APK attached.
#
# Usage:
#   git tag v1.3.0
#   git push origin v1.3.0
#
# Tag format: vMAJOR.MINOR.PATCH (e.g. v1.0.0, v1.2.3)
#
# IMPORTANT — Google Sign-In requires the APK to be signed with a keystore whose
# SHA-1 is registered in Firebase. Set the GitHub secret DEBUG_KEYSTORE_BASE64
# (base64-encoded debug.keystore) so CI uses the SAME signing key as your PC.
# Without it, CI falls back to its own random debug keystore and Google login
# will fail on the downloaded APK.
#
# Android updates require (1) a strictly higher versionCode than the installed app
# and (2) the same signing key. Older workflows used +github.run_number only, so a
# new tag could ship a *lower* versionCode than an install from an old run (Android
# then reports a conflict). CI now sets versionCode from Unix time so each release
# is strictly newer than prior sideloads.
#
# Cloudinary (profile photo uploads): set repository secrets
# CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
# (same names as flutter --dart-define). Without them the APK builds but uploads fail.

name: GitHub Release (tag)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: github-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SEMVER="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "Release tag=$TAG semver=$SEMVER"

      - name: Restore debug keystore from secret
        if: ${{ secrets.DEBUG_KEYSTORE_BASE64 != '' }}
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.android"
          echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > "$HOME/.android/debug.keystore"
          echo "✅ Restored debug.keystore from GitHub secret"
          keytool -list -v -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey -storepass android -keypass android \
            | grep -E "SHA1:|SHA256:" || true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set version in pubspec
        run: |
          SEMVER="${{ steps.tag.outputs.semver }}"
          VCODE=$(($(date +%s)))
          sed -i "s/^version: .*/version: ${SEMVER}+${VCODE}/" pubspec.yaml
          grep '^version:' pubspec.yaml
          echo "Android versionCode=${VCODE} (semver=${SEMVER}, unix time)"

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          flutter build apk --release \
            --dart-define=CLOUDINARY_CLOUD_NAME="${CLOUDINARY_CLOUD_NAME}" \
            --dart-define=CLOUDINARY_API_KEY="${CLOUDINARY_API_KEY}" \
            --dart-define=CLOUDINARY_API_SECRET="${CLOUDINARY_API_SECRET}"

      - name: Verify signing key
        run: |
          echo "APK was signed with this debug keystore:"
          keytool -list -v -keystore "$HOME/.android/debug.keystore" \
            -alias androiddebugkey -storepass android -keypass android \
            | grep -E "SHA1:|SHA256:" || echo "⚠️ Could not read keystore"

      - name: Prepare APK for release
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "Costly-${{ steps.tag.outputs.semver }}.apk"
          ls -la "Costly-${{ steps.tag.outputs.semver }}.apk"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Costly ${{ steps.tag.outputs.semver }}
          generate_release_notes: true
          files: Costly-${{ steps.tag.outputs.semver }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
