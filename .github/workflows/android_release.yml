# Builds a release APK on every push to main (and manual runs).
# Latest build: GitHub → Actions → select workflow run → Artifacts.
# Version: pubspec base 1.0.0 + versionCode = ${{ github.run_number }} (Play-style integer).

name: Android release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set build number in pubspec
        run: |
          sed -i "s/^version: .*/version: 1.0.0+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Stage artifact with clear name
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "Costly-1.0.0-${{ github.run_number }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Costly-android-1.0.0-${{ github.run_number }}
          path: Costly-1.0.0-${{ github.run_number }}.apk
          if-no-files-found: error

      - name: Summary
        run: |
          {
            echo "## Costly Android build"
            echo ""
            echo "| | |"
            echo "|--|--|"
            echo "| **Version name** | 1.0.0 |"
            echo "| **Version code (build)** | ${{ github.run_number }} |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo ""
            echo "Download the APK from the **Artifacts** section of this workflow run."
          } >> "$GITHUB_STEP_SUMMARY"
